<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amsterdam Events Calendar</title>
    <meta name="description" content="Interactive monthly calendar of live music, club nights, and cultural events in Amsterdam.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- ── Header ── -->
    <header id="site-header">
        <div class="header-inner">
            <h1 class="logo">🎛️ Amsterdam Events</h1>
            <div class="header-actions">
                <div class="search-box">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="search-input" placeholder="Search events, artists, venues…" autocomplete="off">
                </div>
                <button id="btn-login" class="login-btn" type="button">Login</button>
                <div id="user-profile" class="user-profile hidden">
                    <span id="user-avatar" class="user-avatar"></span>
                    <button id="btn-logout" class="logout-btn" type="button" title="Logout">🚪</button>
                </div>
                <a href="https://github.com/ultimoboulevard/amsterdam-events-digest/actions/workflows/weekly_digest.yml" target="_blank" rel="noopener" class="refresh-btn" title="Update events data">🔄 Update</a>
            </div>
        </div>
    </header>

    <!-- ── Filters ── -->
    <div class="filters-bar" id="filters-bar">
        <div class="filters-inner">
            <div class="dropdown" id="dd-venue">
                <button class="dropdown-toggle" type="button">Venue <span class="dd-badge" data-count="0"></span></button>
                <div class="dropdown-menu" id="menu-venue"></div>
            </div>
            <div class="dropdown" id="dd-genre">
                <button class="dropdown-toggle" type="button">Genre <span class="dd-badge" data-count="0"></span></button>
                <div class="dropdown-menu" id="menu-genre"></div>
            </div>
            <div class="dropdown" id="dd-type">
                <button class="dropdown-toggle" type="button">Type <span class="dd-badge" data-count="0"></span></button>
                <div class="dropdown-menu" id="menu-type"></div>
            </div>
            <div class="filter-separator"></div>
            <button class="category-btn cat-art" id="btn-cat-art" data-category="art" type="button">🎨 l-ART</button>
            <button class="category-btn cat-classica" id="btn-cat-classica" data-category="classica" type="button">🎻 Classica</button>
            <button class="category-btn cat-jazz" id="btn-cat-jazz" data-category="jazz" type="button">🎷 Jazz</button>
            <button class="fav-toggle" id="btn-friends" type="button" title="Log in to see friends' picks">🫂 Friends' Picks</button>
            <button class="fav-toggle" id="btn-favorites" type="button">⭐ Favorites</button>
            <button class="clear-btn hidden" id="btn-clear" type="button">✕ Clear</button>
        </div>
    </div>

    <!-- ── Main ── -->
    <main class="container">
        <!-- Calendar -->
        <section class="calendar-section" id="calendar-section">
            <div class="cal-nav">
                <button id="btn-prev" class="nav-btn" type="button" aria-label="Previous month">◀</button>
                <h2 id="cal-title" class="cal-title">May 2026</h2>
                <button id="btn-next" class="nav-btn" type="button" aria-label="Next month">▶</button>
                <button id="btn-today" class="today-btn" type="button">Today</button>
            </div>
            <div class="cal-grid" id="cal-grid">
                <div class="cal-hdr">Mon</div>
                <div class="cal-hdr">Tue</div>
                <div class="cal-hdr">Wed</div>
                <div class="cal-hdr">Thu</div>
                <div class="cal-hdr">Fri</div>
                <div class="cal-hdr">Sat</div>
                <div class="cal-hdr">Sun</div>
            </div>
        </section>

        <!-- Day Detail Panel -->
        <section class="day-detail" id="day-detail">
            <div class="detail-header">
                <h3 id="detail-title">Select a day to see events</h3>
                <span class="detail-count" id="detail-count"></span>
            </div>
            <div class="events-grid" id="events-grid"></div>
        </section>

        <!-- Stats -->
        <section class="stats-section" id="stats-section">
            <div class="stat-card"><span class="stat-val" id="stat-total">0</span><span class="stat-lbl">Events</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-venues">0</span><span class="stat-lbl">Venues</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-days">0</span><span class="stat-lbl">Days</span></div>
            <div class="stat-card has-tooltip"><span class="stat-val" id="stat-matches" data-tip="Events where at least one performing artist is found in Fra's Last.fm library or taste profile.">0</span><span class="stat-lbl">Matches</span></div>
            <div class="stat-card has-tooltip"><span class="stat-val" id="stat-sources" data-tip="Number of distinct platforms and venues actively feeding this calendar (e.g. Melkweg, Resident Advisor, Concertgebouw…).">0</span><span class="stat-lbl">Sources</span></div>
        </section>
    </main>

    <!-- ── Footer ── -->
    <footer id="site-footer">
        <p>Amsterdam Event Aggregator · Auto-updated weekly via GitHub Actions</p>
        <p class="gen-time" id="gen-time"></p>
    </footer>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="btn-close-modal" class="modal-close">&times;</button>
            <h2>Welcome Back</h2>
            <p>Log in to save events and see what your friends are attending.</p>
            
            <div class="oauth-buttons">
                <button id="btn-google-login" class="oauth-btn google-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Continue with Google
                </button>
                <button id="btn-apple-login" class="oauth-btn apple-btn">
                    <svg width="18" height="18" viewBox="0 0 170 170"><path fill="currentColor" d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.17-14.34-3.17-4.58 0-9.49 1.05-14.75 3.17-5.26 2.13-9.5 3.24-12.74 3.35-4.92.21-9.6-1.78-14.04-5.97-3.41-2.91-7.46-7.79-12.14-14.62-7.85-11.45-13.43-22.95-16.73-34.52-3.3-11.57-4.95-22.42-4.95-32.55 0-14.28 3.65-25.59 10.95-33.91 6.83-7.85 15.54-11.89 26.13-12.11 4.54 0 9.77 1.1 15.71 3.32 5.93 2.22 9.5 3.33 10.7 3.33 1.54 0 5.48-1.2 11.82-3.59 6.35-2.39 11.8-3.48 16.36-3.27 12.3.2 21.67 3.82 28.11 10.87-10.45 6.36-15.68 15.11-15.68 26.24 0 9.07 3.2 16.7 9.59 22.89 4.6 4.39 10.14 7.21 16.63 8.46-1.77 6.13-4.22 12.06-7.36 17.78zM110.8 25.13c0-7.87-2.92-14.54-8.77-20.03-6.14-5.74-13.3-8.83-21.49-9.28-.15 8.16 2.68 15.02 8.49 20.61 5.92 5.67 13.1 8.64 21.52 8.92.17-.07.25-.14.25-.22z"/></svg>
                    Continue with Apple
                </button>
            </div>
            
            <div class="modal-divider"><span>or magic link</span></div>
            
            <form id="magic-link-form" class="magic-link-form">
                <input type="email" id="login-email" placeholder="Enter your email" required>
                <button type="submit" id="btn-send-magic-link" class="magic-link-btn">Send Magic Link</button>
            </form>
            <p id="login-message" class="login-message"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
