name: Weekly Amsterdam Events Digest

on:
  schedule:
    # Every Monday at 04:00 UTC = 06:00 CEST (Amsterdam summer)
    # In winter (CET) this fires at 05:00 local — close enough.
    - cron: '0 4 * * 1'
  workflow_dispatch:  # Manual trigger button in GitHub Actions UI

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect, build & send weekly digest
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: "domizianafrancescon@gmail.com"
        run: python main.py send

      - name: Export events JSON for calendar site
        run: python export_json.py

      - name: Persist DB back to repo
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data/events.db data/lastfm_cache.db
          git commit -m "Auto-update DB: $(date +'%Y-%m-%d')" || echo "No changes"
          git push

      - name: Deploy calendar site to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
