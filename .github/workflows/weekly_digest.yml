name: Amsterdam Events Pipeline

on:
  schedule:
    # Every day at 04:00 UTC = 06:00 CEST (Amsterdam summer)
    - cron: '0 4 * * *'
  workflow_dispatch:  # Manual trigger button in GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Daily: collect events + update site ──
      - name: Collect events from all sources
        run: python main.py collect

      - name: Export events JSON for calendar site
        run: python export_json.py

      # ── Monday only: build digest + send email ──
      - name: Check day of week
        id: check_day
        run: echo "day=$(date -u +%a)" >> $GITHUB_OUTPUT

      - name: Build & send weekly email digest (Monday only)
        if: steps.check_day.outputs.day == 'Mon' || github.event_name == 'workflow_dispatch'
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: "domizianafrancescon@gmail.com"
        run: python main.py send

      # ── Daily: persist DB + deploy site ──
      - name: Persist DB back to repo
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data/events.db data/lastfm_cache.db
          git commit -m "Auto-update DB: $(date +'%Y-%m-%d')" || echo "No changes"
          git pull --rebase --autostash origin main || true
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
